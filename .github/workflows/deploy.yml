name: Deploy to GitHub Pages

on:
  push:
    branches: [source]  # 监听 source 分支的推送

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # 允许推送到 main 分支

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to main branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: main  # 将 dist/ 内容推到 main 分支
          force_orphan: true    # main 分支只保留最新构建产物，不堆积历史记录
